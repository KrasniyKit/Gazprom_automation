services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_UPLOAD_ENDPOINT: ${VITE_UPLOAD_ENDPOINT:-/api/passports/upload}
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-host.docker.internal:9099}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
