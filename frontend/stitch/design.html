                                    </button>
                                    <button onClick={() => setShowModal(false)} className="px-4 py-2 bg-[#003F87] text-white rounded text-sm font-medium hover:brightness-110 transition-all shadow-sm">
                                        Скачать .xlsx
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </main>
            );
        };

        const App = () => {
            return (
                <MemoryRouter>
                    <div className="flex w-full h-full">
                        <Sidebar />
                        <Routes>
                            <Route path="/" element={<UploadScreen />} />
                            <Route path="/passports" element={<PassportsScreen />} />
                        </Routes>
                    </div>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
